<!--
  stats/view.html
  --------------------------------------------------------------------------
  统计页 - 本月/上月支出 + 甜甜圈图 + 排行榜
  --------------------------------------------------------------------------
-->
<div class="stats-card">
  <div class="stats-period-tabs">
    <button class="stats-period-tab active" data-period="current">本月</button>
    <button class="stats-period-tab"        data-period="last">上月</button>
  </div>

  <div class="stats-summary">
    <div class="stats-summary-label">总支出</div>
    <div class="stats-summary-value" id="stats-total">¥ 0.00</div>
    <div class="stats-summary-detail" id="stats-detail">记账 0 天 · 日均 ¥0</div>
  </div>

  <div class="donut-chart">
    <canvas id="donut-canvas" class="donut-canvas" width="200" height="200"></canvas>
  </div>

  <div class="donut-legend" id="donut-legend"></div>
  <div class="rank-list" id="rank-list"></div>
</div>
